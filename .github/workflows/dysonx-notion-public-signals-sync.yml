name: DysonX Notion Public Signals Sync

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_run:
    workflows: ["DysonX Source Collector V1"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  notion-public-signals-sync:
    name: Sync public Signals from Notion
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'

    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_SIGNAL_INTAKE_DATABASE_ID: ${{ secrets.NOTION_SIGNAL_INTAKE_DATABASE_ID }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync Notion public Signals
        run: python3 scripts/dysonx_notion_public_signals_sync.py --output-root . --output-report tmp/dysonx_public_signals_sync_report.json

      - name: Print public Signals sync diagnostics
        if: always()
        run: |
          if [ -f signals/public_launch_manifest.json ]; then
            python3 - <<'PY'
            import json
            from pathlib import Path

            data = json.loads(Path("signals/public_launch_manifest.json").read_text(encoding="utf-8"))
            print("pages_launched:", data.get("pages_launched"))
            print("pages_blocked:", data.get("pages_blocked"))
            PY
          else
            echo "[notion-public-signals-sync] public launch manifest was not created"
          fi
          if [ -f tmp/dysonx_public_signals_sync_report.json ]; then
            python3 -m json.tool tmp/dysonx_public_signals_sync_report.json
          else
            echo "[notion-public-signals-sync] sync report was not created"
          fi

      - name: Print public Signals diff stat
        if: always()
        run: git diff --stat -- signals

      - name: Upload public Signals diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dysonx-public-signals-diagnostics
          path: |
            signals/public_launch_manifest.json
            tmp/dysonx_public_signals_sync_report.json
          if-no-files-found: warn

      - name: Run static link integrity check
        run: python3 scripts/dysonx_static_preview_check.py --root .

      - name: Run public output grep guards
        run: |
          ! grep -R "https://dysonx.ai" -n signals scripts tests docs
          ! grep -R "media.energizeos.com" -n signals scripts tests docs
          ! grep -R "source.dysonx.invalid" -n signals scripts tests docs
          ! grep -R "\.invalid" -n signals scripts tests docs
          ! grep -R "\.test/" -n signals scripts tests docs
          ! grep -R "tmp/production_publish_pack" -n signals scripts tests docs

      - name: Check auto-merge marker eligibility
        id: auto_merge_marker
        run: |
          python3 - <<'PY'
          import json
          import subprocess
          from pathlib import Path
          import sys

          sys.path.insert(0, "scripts")
          import dysonx_notion_public_signals_sync as sync

          marker = Path("auto_merge_marker.txt")
          manifest_path = Path("signals/public_launch_manifest.json")
          eligible = False
          if manifest_path.exists():
              data = json.loads(manifest_path.read_text(encoding="utf-8"))
              changed_files = subprocess.check_output(["git", "diff", "--name-only", "--", "signals"], text=True).splitlines()
              eligible = sync.auto_merge_marker_eligible(data, changed_files)
          marker.write_text("AUTO_MERGE_CANDIDATE: dysonx-public-signals-v1\n" if eligible else "", encoding="utf-8")
          print(f"eligible={str(eligible).lower()}")
          PY

      - name: Detect public Signals changes
        id: signals_changes
        run: |
          if git diff --quiet -- signals; then
            echo "[notion-public-signals-sync] no signals changes"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open content sync PR
        if: steps.signals_changes.outputs.changed == 'true'
        run: |
          BRANCH="automation/dysonx-notion-signals-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add signals/
          git commit -m "content: sync DysonX public Signals from Notion"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --title "content: sync DysonX public Signals from Notion" \
            --body "$(printf 'Automated Notion public Signals sync. Opens PR only unless the strict DysonX public Signals auto-merge gate passes. No OpenAI call, no scraping, no raw article body copying, no hardcoded deployment domain.\n\n'; cat auto_merge_marker.txt)" \
            --base main \
            --head "$BRANCH"
